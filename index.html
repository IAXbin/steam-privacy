    <title>Steam 销量透视 - 隐私政策</title>
    <style>body { font-family: sans-serif; line-height: 1.6; padding: 40px; max-width: 800px; margin: 0 auto; }</style>

<body>
    <h1>隐私政策 (Privacy Policy)</h1>
    <p><strong>生效日期：2026年3月24日</strong></p>
    <p>1. <strong>数据收集</strong>：本扩展程序不会收集任何个人身份信息、浏览历史或身份数据。</p>
    <p>2. <strong>数据使用</strong>：本程序仅通过 Steam 官方 API 获取公开的游戏评价数及价格数据用于销量估算。</p>
    <p>3. <strong>本地存储</strong>：所有抓取的数据均使用 <code>chrome.storage.local</code> 存储在用户的本地设备中，用于数据缓存和对比增长，不会上传至任何远程服务器。</p>
    <p>4. <strong>打赏说明</strong>：扩展中提供的扫码打赏纯属自愿支持，不涉及任何用户数据的交换。</p>
</body>
</html>
